<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আমার শপ - অর্ডার করুন</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #e63946;
    --primary-dark: #c1121f;
    --accent: #ffd60a;
    --dark: #1a1a2e;
    --darker: #0f0f1a;
    --card-bg: #16213e;
    --text: #eaeaea;
    --muted: #888;
    --success: #06d6a0;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--darker);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, #ff6b6b 100%);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(230,57,70,0.4);
  }

  .header-inner {
    max-width: 1100px;
    margin: auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo span {
    color: var(--accent);
  }

  .cart-btn {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 8px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  .cart-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.6);
  }

  .cart-count {
    background: var(--accent);
    color: #000;
    border-radius: 50%;
    padding: 1px 7px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-left: 6px;
  }

  /* ===== HERO BANNER ===== */
  .hero {
    background: linear-gradient(180deg, rgba(230,57,70,0.15) 0%, transparent 100%);
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
  }

  .hero h2 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .hero p {
    color: var(--muted);
    font-size: 1rem;
  }

  /* ===== MAIN LAYOUT ===== */
  .container {
    max-width: 1100px;
    margin: auto;
    padding: 32px 24px;
  }

  .section-title {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== PRODUCT GRID ===== */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }

  .product-card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative;
  }

  .product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .product-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: linear-gradient(135deg, #1e3a5f, #0d2137);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
  }

  .product-body {
    padding: 16px;
  }

  .product-name {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .product-desc {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .product-price {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .product-price span {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 400;
    text-decoration: line-through;
    margin-left: 6px;
  }

  .add-cart-btn {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    transition: background 0.2s, transform 0.1s;
  }

  .add-cart-btn:hover { background: var(--primary-dark); }
  .add-cart-btn:active { transform: scale(0.97); }

  .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--primary);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 50px;
  }

  /* ===== CART SIDEBAR ===== */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    backdrop-filter: blur(4px);
  }

  .cart-overlay.open { display: block; }

  .cart-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 380px;
    max-width: 95vw;
    background: var(--dark);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    border-left: 1px solid var(--border);
  }

  .cart-panel.open { transform: translateX(0); }

  .cart-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cart-header h3 { font-size: 1.1rem; font-weight: 600; }

  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
  }

  .cart-items { flex: 1; overflow-y: auto; padding: 16px; }

  .cart-item {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: var(--card-bg);
    border-radius: 12px;
    margin-bottom: 10px;
    align-items: center;
    border: 1px solid var(--border);
  }

  .cart-item-emoji { font-size: 2rem; width: 40px; text-align: center; }

  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 0.9rem; font-weight: 600; }
  .cart-item-price { color: var(--accent); font-size: 0.85rem; margin-top: 2px; }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qty-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .qty-btn:hover { background: var(--primary); }
  .qty-num { font-weight: 600; min-width: 20px; text-align: center; }

  .remove-btn {
    background: none;
    border: none;
    color: #ff6b6b;
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
  }

  .cart-empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 1rem;
  }

  .cart-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 1.1rem;
  }

  .cart-total strong { color: var(--accent); font-size: 1.3rem; }

  .checkout-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    transition: opacity 0.2s;
    box-shadow: 0 8px 20px rgba(230,57,70,0.3);
  }

  .checkout-btn:hover { opacity: 0.9; }

  /* ===== ORDER FORM MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(6px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--dark);
    border-radius: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-header h3 { font-size: 1.25rem; font-weight: 700; }
  .modal-header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  .modal-body { padding: 20px 24px 24px; }

  .order-summary {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .order-summary-title {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .order-summary-item {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    padding: 4px 0;
  }

  .order-summary-total {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 1rem;
    padding-top: 10px;
    margin-top: 8px;
    border-top: 1px solid var(--border);
    color: var(--accent);
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 7px;
    color: #ccc;
  }

  label .req { color: var(--primary); margin-left: 2px; }

  input, textarea, select {
    width: 100%;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(230,57,70,0.15);
  }

  textarea { resize: vertical; min-height: 80px; }

  select option { background: var(--dark); }

  .submit-order-btn {
    width: 100%;
    background: linear-gradient(135deg, #06d6a0, #048a81);
    color: #fff;
    border: none;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 8px;
    transition: opacity 0.2s;
    box-shadow: 0 8px 20px rgba(6,214,160,0.25);
  }

  .submit-order-btn:hover { opacity: 0.9; }

  /* ===== SUCCESS SCREEN ===== */
  .success-screen {
    text-align: center;
    padding: 48px 24px;
  }

  .success-icon {
    font-size: 5rem;
    margin-bottom: 16px;
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .success-screen h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .success-screen p { color: var(--muted); margin-bottom: 20px; }

  .order-id-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 600;
  }

  .done-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 12px 36px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    transition: background 0.2s;
  }

  .done-btn:hover { background: var(--primary-dark); }

  /* ===== ADMIN PANEL ===== */
  .admin-toggle {
    text-align: center;
    margin: 40px 0 10px;
  }

  .admin-link {
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: 'Hind Siliguri', sans-serif;
  }

  .admin-panel {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 40px;
    display: none;
  }

  .admin-panel.open { display: block; }

  .admin-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .admin-subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  .orders-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    overflow-x: auto;
    display: block;
  }

  .orders-table th {
    background: rgba(255,255,255,0.05);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .orders-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    white-space: nowrap;
  }

  .orders-table tr:last-child td { border-bottom: none; }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  .status-new { background: rgba(255,214,10,0.15); color: var(--accent); }
  .status-confirmed { background: rgba(6,214,160,0.15); color: var(--success); }
  .status-delivered { background: rgba(100,255,100,0.15); color: #7fff7f; }

  .status-select {
    background: var(--darker);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
  }

  .admin-empty {
    text-align: center;
    color: var(--muted);
    padding: 32px;
  }

  .export-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.85rem;
    margin-top: 16px;
    transition: background 0.2s;
  }

  .export-btn:hover { background: rgba(255,255,255,0.1); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: #000;
    padding: 10px 24px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 0.9rem;
    z-index: 999;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .hero h2 { font-size: 1.5rem; }
    .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .product-img { height: 130px; font-size: 3rem; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">🛍️ আমার <span>শপ</span></div>
    <button class="cart-btn" onclick="openCart()">
      🛒 কার্ট <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h2>স্বাগতম! সেরা পণ্য, সেরা দামে 🎉</h2>
  <p>পণ্য বেছে নিন, অর্ডার করুন — আমরা পৌঁছে দেব</p>
</div>

<!-- MAIN -->
<div class="container">

  <div class="section-title">🔥 আমাদের পণ্যসমূহ</div>

  <!-- PRODUCT GRID -->
  <div class="product-grid" id="productGrid"></div>

  <!-- ADMIN -->
  <div class="admin-toggle">
    <button class="admin-link" onclick="toggleAdmin()">🔐 অর্ডার দেখুন (Admin)</button>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="admin-title">📦 সকল অর্ডার</div>
    <div class="admin-subtitle">নতুন অর্ডার আসলে এখানে দেখা যাবে। স্ট্যাটাস আপডেট করুন।</div>
    <div id="ordersContainer"></div>
    <button class="export-btn" onclick="exportCSV()">📥 CSV হিসেবে ডাউনলোড করুন</button>
  </div>

</div>

<footer>
  তৈরি করা হয়েছে ভালোবাসা দিয়ে ❤️ | সকল পণ্যের মূল্য টাকায়
</footer>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3>🛒 আপনার কার্ট</h3>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>মোট</span>
      <strong id="cartTotal">৳০</strong>
    </div>
    <button class="checkout-btn" onclick="openCheckout()">অর্ডার দিন →</button>
  </div>
</div>

<!-- ORDER FORM MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div id="modalContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ========================================
// ✏️ এখানে আপনার পণ্য যোগ করুন
// ========================================
const PRODUCTS = [
  {
    id: 1,
    name: "পণ্যের নাম ১",
    desc: "পণ্যের বিবরণ এখানে লিখুন। সংক্ষিপ্ত ও আকর্ষণীয় করুন।",
    price: 500,
    oldPrice: 700,
    emoji: "📦",
    badge: "হট ডিল"
  },
  {
    id: 2,
    name: "পণ্যের নাম ২",
    desc: "এই পণ্যটি খুবই উন্নত মানের। গ্রাহকদের পছন্দের তালিকায় শীর্ষে।",
    price: 1200,
    oldPrice: null,
    emoji: "🎁",
    badge: null
  },
  {
    id: 3,
    name: "পণ্যের নাম ৩",
    desc: "বিশেষ অফার! সীমিত সময়ের জন্য বিশেষ ছাড়ে পাওয়া যাচ্ছে।",
    price: 850,
    oldPrice: 1100,
    emoji: "⭐",
    badge: "নতুন"
  },
  {
    id: 4,
    name: "পণ্যের নাম ৪",
    desc: "উচ্চমানের পণ্য, দ্রুত ডেলিভারি নিশ্চিত। অর্ডার করুন এখনই।",
    price: 320,
    oldPrice: null,
    emoji: "🔥",
    badge: null
  }
];

// ========================================
// CART STATE
// ========================================
let cart = [];
let orders = JSON.parse(localStorage.getItem('shopOrders') || '[]');

// ========================================
// RENDER PRODUCTS
// ========================================
function renderProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = PRODUCTS.map(p => `
    <div class="product-card">
      ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
      <div class="product-img">${p.emoji}</div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-price">
          ৳${p.price.toLocaleString('bn-BD')}
          ${p.oldPrice ? `<span>৳${p.oldPrice.toLocaleString('bn-BD')}</span>` : ''}
        </div>
        <button class="add-cart-btn" onclick="addToCart(${p.id})">🛒 কার্টে যোগ করুন</button>
      </div>
    </div>
  `).join('');
}

// ========================================
// CART FUNCTIONS
// ========================================
function addToCart(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  const existing = cart.find(i => i.id === productId);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  updateCartUI();
  showToast(`✅ "${product.name}" কার্টে যোগ হয়েছে`);
}

function updateCartQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  updateCartUI();
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  updateCartUI();
}

function cartTotal() {
  return cart.reduce((s, i) => s + i.price * i.qty, 0);
}

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = count;

  const totalEl = document.getElementById('cartTotal');
  totalEl.textContent = `৳${cartTotal().toLocaleString('bn-BD')}`;

  const itemsEl = document.getElementById('cartItems');
  if (cart.length === 0) {
    itemsEl.innerHTML = `<div class="cart-empty">🛒<br><br>কার্ট ফাঁকা আছে</div>`;
    return;
  }

  itemsEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-emoji">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">৳${(item.price * item.qty).toLocaleString('bn-BD')}</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="updateCartQty(${item.id}, -1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="updateCartQty(${item.id}, 1)">+</button>
      </div>
      <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑</button>
    </div>
  `).join('');
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
}

// ========================================
// CHECKOUT
// ========================================
function openCheckout() {
  if (cart.length === 0) { showToast('⚠️ কার্ট ফাঁকা আছে!'); return; }
  closeCart();

  const summaryItems = cart.map(i =>
    `<div class="order-summary-item"><span>${i.emoji} ${i.name} ×${i.qty}</span><span>৳${(i.price*i.qty).toLocaleString('bn-BD')}</span></div>`
  ).join('');

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div>
        <h3>📋 অর্ডার ফর্ম</h3>
        <p>নিচের তথ্য পূরণ করুন</p>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="order-summary">
        <div class="order-summary-title">অর্ডার সারসংক্ষেপ</div>
        ${summaryItems}
        <div class="order-summary-total"><span>মোট পরিশোধ</span><span>৳${cartTotal().toLocaleString('bn-BD')}</span></div>
      </div>

      <div class="form-group">
        <label>আপনার নাম <span class="req">*</span></label>
        <input type="text" id="custName" placeholder="পূর্ণ নাম লিখুন">
      </div>
      <div class="form-group">
        <label>মোবাইল নম্বর <span class="req">*</span></label>
        <input type="tel" id="custPhone" placeholder="01XXXXXXXXX">
      </div>
      <div class="form-group">
        <label>ঠিকানা <span class="req">*</span></label>
        <textarea id="custAddress" placeholder="বাড়ি/ফ্ল্যাট নম্বর, রাস্তা, এলাকা, জেলা"></textarea>
      </div>
      <div class="form-group">
        <label>পেমেন্ট পদ্ধতি <span class="req">*</span></label>
        <select id="custPayment">
          <option value="">-- বেছে নিন --</option>
          <option value="ক্যাশ অন ডেলিভারি">ক্যাশ অন ডেলিভারি</option>
          <option value="bKash">bKash</option>
          <option value="Nagad">Nagad</option>
          <option value="Rocket">Rocket</option>
        </select>
      </div>
      <div class="form-group">
        <label>বিশেষ নোট (ঐচ্ছিক)</label>
        <textarea id="custNote" placeholder="কোনো বিশেষ নির্দেশনা থাকলে লিখুন..." style="min-height:60px"></textarea>
      </div>

      <button class="submit-order-btn" onclick="submitOrder()">✅ অর্ডার নিশ্চিত করুন</button>
    </div>
  `;

  document.getElementById('orderModal').classList.add('open');
}

function closeModal() {
  document.getElementById('orderModal').classList.remove('open');
}

function submitOrder() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const address = document.getElementById('custAddress').value.trim();
  const payment = document.getElementById('custPayment').value;

  if (!name || !phone || !address || !payment) {
    showToast('⚠️ সকল তারকাচিহ্নিত ঘর পূরণ করুন');
    return;
  }

  const orderId = 'ORD-' + Date.now().toString().slice(-6);
  const order = {
    id: orderId,
    date: new Date().toLocaleString('bn-BD'),
    name,
    phone,
    address,
    payment,
    note: document.getElementById('custNote').value.trim(),
    items: [...cart],
    total: cartTotal(),
    status: 'নতুন'
  };

  orders.unshift(order);
  localStorage.setItem('shopOrders', JSON.stringify(orders));

  // Clear cart
  cart = [];
  updateCartUI();

  // Show success
  document.getElementById('modalContent').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">🎉</div>
      <h3>অর্ডার হয়ে গেছে!</h3>
      <p>আপনার অর্ডার আমরা পেয়েছি। শীঘ্রই যোগাযোগ করা হবে।</p>
      <div class="order-id-box">অর্ডার আইডি: ${orderId}</div>
      <button class="done-btn" onclick="closeModal()">ঠিক আছে 👍</button>
    </div>
  `;

  renderOrders();
}

// ========================================
// ADMIN / ORDERS
// ========================================
function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderOrders();
}

function renderOrders() {
  const container = document.getElementById('ordersContainer');
  if (orders.length === 0) {
    container.innerHTML = `<div class="admin-empty">📭 এখনো কোনো অর্ডার নেই</div>`;
    return;
  }

  container.innerHTML = `
    <table class="orders-table">
      <thead>
        <tr>
          <th>অর্ডার ID</th>
          <th>তারিখ</th>
          <th>নাম</th>
          <th>মোবাইল</th>
          <th>পণ্য</th>
          <th>মোট</th>
          <th>পেমেন্ট</th>
          <th>স্ট্যাটাস</th>
        </tr>
      </thead>
      <tbody>
        ${orders.map((o, idx) => `
          <tr>
            <td><strong style="color:var(--accent)">${o.id}</strong></td>
            <td>${o.date}</td>
            <td>${o.name}</td>
            <td><a href="tel:${o.phone}" style="color:var(--success)">${o.phone}</a></td>
            <td>${o.items.map(i => `${i.emoji}${i.name}×${i.qty}`).join(', ')}</td>
            <td><strong>৳${o.total.toLocaleString()}</strong></td>
            <td>${o.payment}</td>
            <td>
              <select class="status-select" onchange="updateStatus(${idx}, this.value)">
                <option ${o.status==='নতুন'?'selected':''}>নতুন</option>
                <option ${o.status==='নিশ্চিত'?'selected':''}>নিশ্চিত</option>
                <option ${o.status==='ডেলিভারি হয়েছে'?'selected':''}>ডেলিভারি হয়েছে</option>
                <option ${o.status==='বাতিল'?'selected':''}>বাতিল</option>
              </select>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function updateStatus(idx, val) {
  orders[idx].status = val;
  localStorage.setItem('shopOrders', JSON.stringify(orders));
  showToast('✅ স্ট্যাটাস আপডেট হয়েছে');
}

function exportCSV() {
  if (orders.length === 0) { showToast('⚠️ কোনো অর্ডার নেই'); return; }
  const rows = [['ID','তারিখ','নাম','মোবাইল','ঠিকানা','পণ্য','মোট','পেমেন্ট','স্ট্যাটাস']];
  orders.forEach(o => {
    rows.push([
      o.id, o.date, o.name, o.phone, o.address,
      o.items.map(i=>`${i.name} x${i.qty}`).join(' | '),
      o.total, o.payment, o.status
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'orders_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('📥 ডাউনলোড শুরু হয়েছে');
}

// ========================================
// TOAST
// ========================================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ========================================
// INIT
// ========================================
renderProducts();
updateCartUI();
</script>
</body>
</html>
